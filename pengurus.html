<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"> <!-- INI PENTING BIAR EMOJI GA RUSAK -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peralatan Blok AC</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: url('bg.png') no-repeat center fixed;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      color: white;
      padding: 20px 20px 100px 20px;
      display: flex;
      flex-direction: column;
    }

    .container {
      flex: 1;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 28px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
      font-weight: 700;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 420px;
      margin: 0 auto;
    }

    .menu-card {
      border-radius: 24px;
      padding: 25px 15px;
      text-align: center;
      color: #fff;
      height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 32px 0 rgba(0,0,0,0.4);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .menu-card:active {
      transform: scale(0.96);
    }

    .menu-card .icon {
      font-size: 42px;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    .menu-card .judul {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .menu-card .subjudul {
      font-size: 12px;
      opacity: 0.85;
    }

    /* Tombol Kembali bawah tengah - floating */
    .back-btn {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 35px;
      border-radius: 50px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 999;
    }

    .back-btn:active {
      transform: translateX(-50%) scale(0.94);
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Peralatan Blok AC</h1>
    
    <div class="menu-grid">
      <!-- Card Mesin Rumput -->
      <a href="inputkas.html" class="menu-card">
        <div class="icon">📝</div>
        <div class="judul">Input Cashflow</div>
        <div class="subjudul">Pengeluaran - Pemasukan</div>
      </a>
  <a href="inputiuran.html" class="menu-card">
        <div class="icon">📝</div>
        <div class="judul">Input Iuran Bulanan</div>
        <div class="subjudul">Iuran Bulanan</div>
      </a>
<a href="rapat.html" class="menu-card">
        <div class="icon">📝</div>
        <div class="judul">catatan rapat</div>
        <div class="subjudul">pembuatan pdf untuk notulensi</div>
      </a>


      <!-- Card Peralatan Lain -->
    
  <!-- Tombol Kembali di bawah tengah -->
<button class="back-btn" onclick="window.location.href='menuu.html'">
  ← Kembali
</button>
<script>
const PIN_PENGURUS = "20242026"; // Ganti dengan PIN Anda

// Fungsi untuk membuka overlay saat tombol Pengurus diklik
function bukaPin() {
    document.getElementById('pin-overlay').style.display = 'flex';
}

function tutupPin() {
    document.getElementById('pin-overlay').style.display = 'none';
    document.getElementById('pin-input').value = "";
}

function validasiPin() {
    const input = document.getElementById('pin-input').value;
    if (input === PIN_PENGURUS) {
        alert("Akses Diterima");
        // Arahkan ke halaman/menu pengurus Anda
        window.location.href = "halaman_pengurus.html"; 
    } else {
        alert("PIN Salah!");
        document.getElementById('pin-input').value = "";
    }
}
</script>
<div id="pin-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center;">
    <div class="glass-pin-card">
        <h3 style="color:white;">Akses Pengurus</h3>
        <input type="password" id="pin-input" maxlength="4" placeholder="••••" style="text-align:center; font-size:24px; padding:10px; border-radius:10px; border:none; width:80%;">
        <button class="btn-pin" onclick="validasiPin()">MASUK</button>
        <button onclick="tutupPin()" style="background:transparent; border:none; color:#ddd; margin-top:10px;">Batal</button>
    </div>
</div>

</body>
</html>
