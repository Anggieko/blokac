<!DOCTYPE html>
<html lang="id">
<head>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  window.OneSignalDeferred.push(async function(OneSignal) {
      // 1. Jalankan inisialisasi sampai selesai
      await OneSignal.init({
          appId: "d85bd0c7-fcfb-45d8-b8e0-3967b4011332",
          allowLocalhostAsSecureOrigin: true
      });

      // 2. Minta izin notifikasi ke warga setelah init selesai
      OneSignal.Notifications.requestPermission();
  });
</script>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Info Warga Blok AC</title>

<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Info Blok AC">
<meta name="theme-color" content="#0f9b8e">
<meta name="description" content="Sarana informasi warga Blok AC">
<link rel="apple-touch-icon" href="logo-AC.png">

<style>
body,html{margin:0;padding:0;height:100%;font-family:'Segoe UI',sans-serif;overflow:hidden}
body{
  animation:slideInRight 0.5s ease-out;
}
@keyframes slideInRight{
  from{opacity:0;transform:translateX(100vw);}
  to{opacity:1;transform:translateX(0);}
}

/* ========== WELCOME PAGE ========== */
#welcomePage{
  height:100vh;width:100%;
  background:url('./bg.png') center/cover no-repeat;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;color:#fff;position:fixed;top:0;left:0;z-index:9999;
}
#welcomePage::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%);
  backdrop-filter:blur(3px);
}
.logo{
  width:110px;height:110px;border-radius:50%;border:4px solid #fff;
  box-shadow:0 0 30px rgba(255,255,255,0.4);position:relative;z-index:2;
  margin-bottom:25px;object-fit:cover;animation:naikTurun 3s ease-in-out infinite;
}
h1{font-size:30px;font-weight:800;margin:0 0 10px 0;position:relative;z-index:2;text-shadow:0 3px 15px rgba(0,0,0,0.6)}
p.desc{font-size:15px;line-height:1.7;max-width:300px;margin:0 0 40px 0;position:relative;z-index:2;text-shadow:0 2px 10px rgba(0,0,0,0.6)}
.btn-masuk{
  padding:16px 60px;font-size:18px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);
  border:0;border-radius:50px;cursor:pointer;position:relative;z-index:2;
  box-shadow:0 10px 30px rgba(22,163,74,0.4);animation:melayang 2.5s ease-in-out infinite;
  overflow:hidden;
}
.btn-masuk::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
  transition:0.5s;
}
.btn-masuk:active::before{left:100%}
.btn-masuk:active{transform:scale(0.95)}

@keyframes melayang{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
@keyframes naikTurun{0%,100%{transform:translateY(0px)}50%{transform:translateY(-5px)}}

@keyframes slideOutLeft{
  from{opacity:1; transform:translateX(0)}
  to{opacity:0; transform:translateX(-100vw)}
}
</style>
</head>
<body>

<div id="welcomePage">
  <img src="logo-AC.png" class="logo" alt="Logo Blok AC">
  <h1>INFO WARGA BLOK AC</h1>
  <p class="desc">
    92 unit - Saling Jaga, Saling Bantu<br>Tamu wajib Lapor 1x24 jam
  </p>
  <button class="btn-masuk" onclick="masukWeb()">Masuk</button>
</div>

<script>
async function masukWeb() {
  // Panggil request permission OneSignal secara eksplisit saat klik tombol
  if (window.OneSignalDeferred) {
    window.OneSignalDeferred.push(async function(OneSignal) {
      try {
        console.log("Meminta izin notifikasi...");
        await OneSignal.Notifications.requestPermission();
      } catch (err) {
        console.error("Gagal/Dilewati meminta izin:", err);
      }
    });
  }

  // Efek animasi transisi slideOut halaman lama sebelum pindah
  document.body.style.animation = 'slideOutLeft 0.3s ease-in forwards';
  setTimeout(function(){
    window.location.href = 'menuu.html?v=' + Date.now();
  }, 300);
}

// ===== REGISTER ONE SIGNAL SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/OneSignalSDKWorker.js')
    .then(() => console.log('✅ OneSignal Service Worker terdaftar!'))
    .catch(err => console.log('❌ Service Worker gagal mendaftar:', err));
}
</script>

</body>
</html>
