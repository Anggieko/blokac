<!DOCTYPE html>
<html lang="id">
<head>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "d85bd0c7-fcfb-45d8-b8e0-3967b4011332",
    });
  });
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Info Warga Blok AC</title>

<!-- ===== PWA META TAGS ===== -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Info Blok AC">
<meta name="theme-color" content="#0f9b8e">
<meta name="description" content="Sarana informasi warga Blok AC">
<link rel="apple-touch-icon" href="logo-AC.png">

<style>
body,html{margin:0;padding:0;height:100%;font-family:'Segoe UI',sans-serif;overflow:hidden}
body{
  animation:slideInRight 0.5s ease-out;
}
@keyframes slideInRight{
  from{
    opacity:0;
    transform:translateX(100vw); /* mulai dari luar layar kanan */
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* ========== WELCOME PAGE ========== */
#welcomePage{
  height:100vh;width:100%;
  background:url('./bg.png') center/cover no-repeat;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;color:#fff;position:fixed;top:0;left:0;z-index:9999;
}
#welcomePage::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%);
  backdrop-filter:blur(3px);
}
.logo{
  width:110px;height:110px;border-radius:50%;border:4px solid #fff;
  box-shadow:0 0 30px rgba(255,255,255,0.4);position:relative;z-index:2;
  margin-bottom:25px;object-fit:cover;animation:naikTurun 3s ease-in-out infinite;
}
h1{font-size:30px;font-weight:800;margin:0 0 10px 0;position:relative;z-index:2;text-shadow:0 3px 15px rgba(0,0,0,0.6)}
p.desc{font-size:15px;line-height:1.7;max-width:300px;margin:0 0 40px 0;position:relative;z-index:2;text-shadow:0 2px 10px rgba(0,0,0,0.6)}
.btn-masuk{
  padding:16px 60px;font-size:18px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);
  border:0;border-radius:50px;cursor:pointer;position:relative;z-index:2;
  box-shadow:0 10px 30px rgba(22,163,74,0.4);animation:melayang 2.5s ease-in-out infinite;
  overflow:hidden;
}
.btn-masuk::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
  transition:0.5s;
}
.btn-masuk:active::before{left:100%}
.btn-masuk:active{transform:scale(0.95)}

@keyframes melayang{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
@keyframes naikTurun{0%,100%{transform:translateY(0px)}50%{transform:translateY(-5px)}}

/* ========== KONTEN UTAMA ========== */
#mainContent{display:none} /* disembunyiin dulu */
#mainContent{
  min-height:100vh;
  background:linear-gradient(180deg,#e0e7ff 0%,#f8fafc 100%);
  padding:20px 15px 80px 15px;
  font-family:'Segoe UI',sans-serif;
  display:block;
}

   /* CARD NOTIFIKASI ATAS */
 .notif-card{
    background:#fff;
    border-radius:24px;
    padding:18px 16px;
    margin-bottom:30px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    cursor:pointer;
  }
 .notif-header{
    display:flex;gap:10px;align-items:center;margin-bottom:10px;
  }
 .notif-header.bell{
    font-size:22px;color:#ef4444;
  }
 .notif-header.judul{
    font-weight:700;font-size:14px;color:#111;
  }
 .notif-isi{
  font-size:13px;color:#555;line-height:1.5;
  white-space:pre-wrap; /* biar enter di Sheet kebaca */
  word-wrap:break-word;
}
  /* 2. GRID MENU 2x2 */
  .grid-menu{
    display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:30px;
  }
  .menu-card{
    border-radius:24px;
    padding:25px 15px;
    text-align:center;
    color:#fff;
    box-shadow:0 8px 30px rgba(0,0,0,0.25);
    cursor:pointer;
    transition:0.2s;
  }
  .menu-card:active{transform:scale(0.95)}
  .menu-card .icon{
    font-size:38px;margin-bottom:10px;display:block;
  }
  .menu-card .title{
    font-size:18px;font-weight:700;margin-bottom:4px;
  }
  .menu-card .sub{
    font-size:11px;opacity:0.85;
  }
  .blue{background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%)}
  .green{background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%)}
  .orange{background:linear-gradient(135deg,#f97316 0%,#ea580c 100%)}

/* BOTTOM NAV - PAKSA KENA PAKE !IMPORTANT */
div[style*="position:fixed"][style*="bottom:0"]{
  background:white !important; /* paksa solid */
  backdrop-filter:none !important; /* matiin blur */
  -webkit-backdrop-filter:none !important;
  padding:12px 16px !important; /* kiri kanan 16px biar sejajar */
  border-top:1px solid #e5e7eb !important;
  box-shadow:0 -4px 15px rgba(0,0,0,0.08) !important;
  z-index:9999 !important;
}

/* ICON + TEXT BAWAH */
div[style*="position:fixed"][style*="bottom:0"] > div{
  color:#6b7280 !important;
  font-weight:600 !important;
}
div[style*="position:fixed"][style*="bottom:0"] > div.active{
  color:#0f9b8e !important;
}
</style>
</head>
<body>

<!-- 1. WELCOME PAGE DEPAN -->
<div id="welcomePage">
  <img src="logo-AC.png" class="logo" alt="Logo Blok AC">
  <h1>INFO WARGA BLOK AC</h1>
  <p class="desc">
    92 unit - Saling Jaga, Saling Bantu<br>Tamu wajib Lapor 1x24 jam
     </p>

<button class="btn-masuk" onclick="masukWeb()">Masuk</button>

</div>

<script>
function bukaMenu(){
  // kasih efek fade out dulu di halaman ini
  document.body.style.animation = 'slideOutLeft 0.3s ease-in forwards';
  
  // setelah 0.3 detik baru pindah ke menu.html
  setTimeout(function(){
    window.location.href = 'menu.html';
  }, 300);
}

/* Animasi keluar ke kiri */
document.head.insertAdjacentHTML('beforeend', `
<style>
@keyframes slideOutLeft{
  from{opacity:1; transform:translateX(0)}
  to{opacity:0; transform:translateX(-100vw)}
}
</style>
`);
</script>
<script>

function masukWeb(){
  window.location.href = 'menuu.html?v=' + Date.now();
}

// ===== REGISTER SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('✅ Service Worker registered!'))
    .catch(err => console.log('❌ Service Worker failed:', err));
}
</script>

</body>
</html>
