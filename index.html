<!DOCTYPE html>
<html lang="id">
<head>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  window.OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
          appId: "d85bd0c7-fcfb-45d8-b8e0-3967b4011332",
          allowLocalhostAsSecureOrigin: true
      });
  });
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Info Warga Blok AC</title>

<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Info Blok AC">
<meta name="theme-color" content="#0f9b8e">
<meta name="description" content="Sarana informasi warga Blok AC">
<link rel="apple-touch-icon" href="logoacnew.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body, html {
  height: 100%;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden;
}

body {
  animation: slideInRight 0.6s ease-out;
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(100vw); }
  to { opacity: 1; transform: translateX(0); }
}

/* ========== WELCOME PAGE ========== */
#welcomePage {
  height: 100vh;
  width: 100%;
  background: url('./bg.png') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: #fff;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;
}

#welcomePage::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}

.logo {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.9);
  box-shadow: 0 0 40px rgba(255,255,255,0.3);
  position: relative;
  z-index: 2;
  margin-bottom: 25px;
  object-fit: cover;
  animation: naikTurun 3s ease-in-out infinite;
  background: #0f9b8e; /* fallback jika gambar gagal */
}

h1 {
  font-size: 30px;
  font-weight: 800;
  margin: 0 0 8px 0;
  position: relative;
  z-index: 2;
  text-shadow: 0 3px 20px rgba(0,0,0,0.7);
  letter-spacing: 1px;
}

.desc {
  font-size: 15px;
  line-height: 1.8;
  max-width: 320px;
  margin: 0 20px 40px 20px;
  position: relative;
  z-index: 2;
  text-shadow: 0 2px 15px rgba(0,0,0,0.7);
}

.desc .highlight {
  font-weight: 700;
  color: #fbbf24;
  background: rgba(251, 191, 36, 0.15);
  padding: 2px 10px;
  border-radius: 20px;
  display: inline-block;
  margin-top: 4px;
}

.btn-masuk {
  padding: 16px 60px;
  font-size: 18px;
  font-weight: 800;
  color: #fff;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  position: relative;
  z-index: 2;
  box-shadow: 0 10px 35px rgba(22, 163, 74, 0.5);
  animation: melayang 2.5s ease-in-out infinite;
  overflow: hidden;
  transition: transform 0.2s ease;
  min-width: 200px;
}

.btn-masuk::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: 0.6s;
}

.btn-masuk:hover::before {
  left: 100%;
}

.btn-masuk:active {
  transform: scale(0.95);
}

.btn-masuk:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  animation: none;
}

@keyframes melayang {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

@keyframes naikTurun {
  0%, 100% { transform: translateY(0px) scale(1); }
  50% { transform: translateY(-8px) scale(1.02); }
}

/* ===== ANIMASI KELUAR ===== */
@keyframes slideOutLeft {
  0% { 
    opacity: 1; 
    transform: translateX(0) scale(1); 
  }
  100% { 
    opacity: 0; 
    transform: translateX(-100vw) scale(0.9); 
  }
}

body.slide-out {
  animation: slideOutLeft 0.4s ease-in forwards;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .logo {
    width: 100px;
    height: 100px;
  }
  h1 {
    font-size: 24px;
  }
  .desc {
    font-size: 14px;
    max-width: 280px;
  }
  .btn-masuk {
    padding: 14px 40px;
    font-size: 16px;
    min-width: 160px;
  }
}

@media (min-width: 768px) {
  .logo {
    width: 150px;
    height: 150px;
  }
  h1 {
    font-size: 38px;
  }
  .desc {
    font-size: 18px;
    max-width: 400px;
  }
}
</style>
<link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="logoacnew.png">
</head>
<body>

<div id="welcomePage">
  <img src="logo-AC.png" class="logo" alt="Logo Blok AC" onerror="this.style.background='#0f9b8e'">
  <h1>INFO WARGA BLOK AC</h1>
  <p class="desc">
    92 unit · Saling Jaga, Saling Bantu<br>
    <span class="highlight">⚠️ Tamu wajib Lapor 1x24 jam</span>
  </p>
  <button class="btn-masuk" id="btnMasuk" onclick="masukWeb()">Masuk</button>
</div>

<script>
async function masukWeb() {
  const btn = document.getElementById('btnMasuk');
  
  // Disable tombol dan tampilkan loading
  btn.textContent = '⏳ Memuat...';
  btn.disabled = true;
  btn.style.animation = 'none';

  // Panggil request permission OneSignal
  if (window.OneSignalDeferred) {
    window.OneSignalDeferred.push(async function(OneSignal) {
      try {
        console.log("📢 Meminta izin notifikasi...");
        await OneSignal.Notifications.requestPermission();
        console.log("✅ Izin notifikasi selesai");
      } catch (err) {
        console.error("❌ Gagal meminta izin:", err);
      }
    });
  }

  // Efek animasi slideOut
  document.body.classList.add('slide-out');
  
  // Redirect setelah animasi selesai
  setTimeout(function() {
    window.location.href = 'menuu.html?v=' + Date.now();
  }, 450);
}

// ===== REGISTER ONESIGNAL SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/OneSignalSDKWorker.js')
    .then(() => console.log('✅ OneSignal Service Worker terdaftar!'))
    .catch(err => console.log('❌ Service Worker gagal mendaftar:', err));
}

// ===== TOMBOL BISA DIKLIK DENGAN SPASI/ENTER =====
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    const btn = document.getElementById('btnMasuk');
    if (document.activeElement === btn || document.activeElement === document.body) {
      e.preventDefault();
      masukWeb();
    }
  }
});
</script>

</body>
</html>
