<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Menu Blok AC</title>
<style>
body {
  margin: 0;
  padding: 20px;
  font-family: sans-serif;
  color: #fff;
  background: url('bg.png') no-repeat center fixed; /* GANTI NAMA FOTO KAMU DI SINI */
  background-size: cover;
}

h2 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

/* CAROUSEL GLASS STYLE */


.carousel-container {
  position: relative;
  width: 100%;
  overflow: hidden;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.25);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  margin-bottom: 12px;
  box-sizing: border-box;
}

.carousel-slider {
  display: flex;
  transition: transform 0.5s ease-in-out;
  width: 100%;
}

.slide-item {
  min-width: 100%;
  width: 100%;
  flex-shrink: 0;
  box-sizing: border-box;
}
.slide-img-content img {
  cursor: pointer; /* Memberi indikasi bahwa gambar bisa diklik */
  pointer-events: auto;
}

/* Bagian Gambar yang dioptimasi */
.slide-img-content {
  position: relative;
  width: 100%;
  /* Gunakan aspect-ratio agar tinggi otomatis mengikuti lebar (sangat rapi di mobile) */
  aspect-ratio: 16 / 9; 
  overflow: hidden;
  border-radius: 20px;
}

.slide-img-content img {
  width: 100%;
  height: 100%;
  /* Cover memastikan gambar mengisi seluruh kotak tanpa distorsi */
  object-fit: cover;
  /* Memastikan fokus gambar tetap di tengah */
  object-position: center;
  display: block;
  /* Hapus filter agar gambar tampil jernih seperti aslinya */
  filter: none;
}

/* Jika Anda ingin teks di bawah gambar, biarkan ini */
.slide-img-text {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 16px;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
  color: white;
  z-index: 10;
}

.carousel-dots {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 20;
}

.carousel-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.6);
  border: none;
  padding: 0;
  cursor: pointer;
  transition: all 0.3s ease;
}

.carousel-dot.active {
  background: #fff;
  width: 16px;
  border-radius: 4px;
}
/* Styling Modal */
.modal {
  display: none; 
  position: fixed;
  z-index: 1000;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9); /* Latar gelap */
  backdrop-filter: blur(5px);
}

.modal-content {
  margin: auto;
  display: block;
  width: 90%;
  max-width: 700px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 40px;
  cursor: pointer;
}


/* MENU CARD UTAMA */
.menu-card {
  border-radius: 20px;
  padding: 20px 10px;
  text-align: center;
  color: #fff;
  height: 140px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  margin-bottom: 16px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 8px 32px 0 rgba(0,0,0,0.4);
  animation: slideInLeft 0.6s ease-out backwards;
  transition: all 0.2s;
  box-sizing: border-box;
}

.menu-card:active {
  transform: scale(0.96);
  background: rgba(255,255,255,0.08);
}

.icon {
  font-size: 42px;
  margin-bottom: 12px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

.title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 5px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.6);
}

.sub {
  font-size: 13px;
  opacity: 0.9;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}

.grid-menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.flex-2kolom {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-60px); }
  to { opacity: 1; transform: translateX(0); }
}
</style>
</head>
<body>

<h2>Selamat Datang di Sarana informasi Blok AC</h2>

<div class="carousel-container">
  <div id="carouselSlider" class="carousel-slider">
    <div class="slide-item">
      <div class="slide-text-content" style="text-align: center; color: rgba(255,255,255,0.8); font-size: 14px;">
        ⏳ Memuat informasi Blok AC...
      </div>
    </div>
  </div>
  <div id="carouselDots" class="carousel-dots"></div>
</div>
<div id="imageModal" class="modal">
  <span class="close">&times;</span>
  <img class="modal-content" id="fullImage">
</div>


<div class="grid-menu">
  <div class="menu-card" onclick="window.location.href='cashflow.html'">
    <div class="icon">🔄</div>
    <div class="title">CASHFLOW</div>
    <div class="sub">Pemasukan - Pengeluaran</div>
  </div>
  
  <div class="menu-card" onclick="window.location.href='iuran1.html'">
    <div class="icon">💵</div>
    <div class="title">Status<br>Pembayaran<br>Iuran</div>
    <div class="sub"></div>
  </div>
</div>

<div class="menu-card" onclick="window.location.href='kontak.html'">
  <div class="icon">📞</div>
  <div class="title">KONTAK</div>
  <div class="sub">Daftar Kontak Pengurus</div>
</div>

<div class="flex-2kolom">
  <div class="menu-card" style="flex:1" onclick="window.location.href='forumlist.html'">
    <div class="icon">💬</div>
    <div class="title">Forum</div>
    <div class="sub"></div>
  </div>
  
  <div class="menu-card" style="flex:1" onclick="window.location.href='lapor.html'">
    <div class="icon">📝</div>
    <div class="title">Lapor & Keluhan</div>
    <div class="sub"></div>
  </div>
</div>
<div class="menu-card" onclick="window.location.href='catatansipil.html'">
  <div class="icon">🗂️</div>
  <div class="title">Data Kependudukan</div>
  <div class="sub">catatan sipil warga</div>
</div>

<div class="menu-card" onclick="window.location.href='peralatan.html'">
  <div class="icon">🛠️</div>
  <div class="title">Peralatan</div>
  <div class="sub">Daftar Peralatan</div>
</div>

<script>
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxyBTKTznI1xkqqAb6MtVLp4F_mW3irH0GGiufQbdjdjwfCsbwVCBYmCzHKVFCay13E/exec";

let currentSlide = 0;
let totalSlides = 0;
let autoPlayInterval;

async function loadCarouselFromSheet() {
  try {
    const response = await fetch(SHEET_API_URL);
    const data = await response.json();
    
    const slider = document.getElementById('carouselSlider');
    const dotsContainer = document.getElementById('carouselDots');
    
    slider.innerHTML = '';
    dotsContainer.innerHTML = '';
    totalSlides = data.length;

    if (totalSlides === 0) {
      slider.innerHTML = '<div class="slide-item"><div class="slide-text-content" style="text-align:center;">Belum ada pengumuman terbaru.</div></div>';
      return;
    }

    data.forEach((item, index) => {
      let slideHTML = '';
      const tipe = (item.tipe || '').toLowerCase().trim();

      if (tipe === 'teks') {
        slideHTML = `
          <div class="slide-item">
            <div class="slide-text-content">
              <div>
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
                  <span style="font-size:20px;">📢</span>
                  <h4 style="margin:0; font-size:13px; font-weight:bold; text-transform:uppercase; tracking-wide:0.05em; opacity:0.9;">${item.judul}</h4>
                </div>
                <p style="margin:0; font-size:14px; font-weight:500; line-height:1.5;">${item.konten}</p>
              </div>
              <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.1); font-size:10px; color:rgba(255,255,255,0.5);">
                <span>Blok AC Info</span>
                <span style="background:rgba(255,255,255,0.15); padding:2px 8px; border-radius:10px;">${index + 1} / ${totalSlides}</span>
              </div>
            </div>
          </div>
        `;
      } else if (tipe === 'gambar') {
        slideHTML = `
          <div class="slide-item">
            <div class="slide-img-content">
              <img src="${item.konten}" alt="${item.judul}" onerror="this.src='https://placehold.co/600x400/22c55e/white?text=Gambar+Error'">
              <div class="slide-img-overlay"></div>
              <div class="slide-img-text">
                <span style="font-size:10px; font-weight:bold; text-transform:uppercase; color:#fbbf24; background:rgba(251,191,36,0.2); padding:2px 6px; border:1px solid rgba(251,191,36,0.3); border-radius:4px; display:inline-block; margin-bottom:6px;">Kegiatan</span>
                <h4 style="margin:0; font-size:14px; font-weight:bold; line-height:1.4;">${item.judul}</h4>
              </div>
            </div>
          </div>
        `;
      }

      slider.insertAdjacentHTML('beforeend', slideHTML);

      const dot = document.createElement('button');
      dot.className = `carousel-dot ${index === 0 ? 'active' : ''}`;
      dot.onclick = () => goToSlide(index);
      dotsContainer.appendChild(dot);
    });

    updateCarousel();
    autoPlayInterval = setInterval(nextSlide, 5000);

  } catch (error) {
    console.error("Gagal mengambil data dari Google Sheets:", error);
    document.getElementById('carouselSlider').innerHTML = '<div class="slide-item"><div class="slide-text-content" style="text-align:center; color:#f87171;">❌ Gagal memuat pengumuman terbaru.</div></div>';
  }
}

function updateCarousel() {
  const slider = document.getElementById('carouselSlider');
  const dots = document.querySelectorAll('.carousel-dot');
  
  if (!slider || dots.length === 0) return;

  slider.style.transform = `translateX(-${currentSlide * 100}%)`;
  
  dots.forEach((dot, index) => {
    if (index === currentSlide) {
      dot.classList.add('active');
    } else {
      dot.classList.remove('active');
    }
  });
}

function nextSlide() {
  if (totalSlides > 0) {
    currentSlide = (currentSlide + 1) % totalSlides;
    updateCarousel();
  }
}

function goToSlide(index) {
  currentSlide = index;
  updateCarousel();
}

window.addEventListener('DOMContentLoaded', loadCarouselFromSheet);
// Ambil elemen modal
const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("fullImage");
const slides = document.querySelectorAll(".slide-img-content img");

// Fungsi untuk membuka modal saat gambar diklik
slides.forEach(img => {
  img.onclick = function() {
    modal.style.display = "block";
    modalImg.src = this.src;
  }
});

// Fungsi untuk menutup modal saat diklik di luar gambar
modal.onclick = function() {
  modal.style.display = "none";
};

// Tutup dengan tombol silang
document.querySelector(".close").onclick = function() {
  modal.style.display = "none";
};


</script>

</body>
</html>
