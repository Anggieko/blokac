<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Input Iuran Warga</title>

<!-- ===== PWA META TAGS ===== -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Info Blok AC">
<meta name="theme-color" content="#0f9b8e">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  background:url('bg.png') no-repeat center fixed;
  background-size:cover;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px 15px 100px;
}

.box{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.25);
  padding:28px 22px;
  border-radius:24px;
  width:100%;
  max-width:420px;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

h2{
  text-align:center;
  color:#fff;
  margin-bottom:25px;
  font-size:22px;
  text-shadow:0 2px 8px rgba(0,0,0,0.3);
}

label{
  font-weight:600;
  color:#fff;
  display:block;
  margin-top:15px;
  margin-bottom:8px;
  font-size:15px;
  text-shadow:0 1px 4px rgba(0,0,0,0.3);
}

select{
  width:100%;
  padding:13px;
  border:2px solid rgba(255,255,255,0.3);
  border-radius:12px;
  font-size:15px;
  background:rgba(255,255,255,0.9);
  color:#333;
  outline:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px;
}

.grid label{
  background:rgba(255,255,255,0.2);
  border:2px solid rgba(255,255,255,0.3);
  padding:12px 8px;
  border-radius:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-size:14px;
  color:#fff;
  font-weight:500;
  transition:0.2s;
  text-shadow:none;
  margin:0;
}

.grid label:has(input:checked){
  background:rgba(46,125,50,0.7);
  border-color:#2e7d32;
  font-weight:700;
}

input[type=checkbox]{
  width:18px;
  height:18px;
  accent-color:#2e7d32;
}

.btn{
  background:#2e7d32;
  color:#fff;
  border:none;
  padding:15px;
  width:100%;
  border-radius:14px;
  font-weight:700;
  font-size:16px;
  cursor:pointer;
  margin-top:22px;
  box-shadow:0 4px 12px rgba(46,125,50,0.4);
  transition:0.2s;
}

.btn:active{transform:scale(0.97)}
.btn:disabled{background:rgba(170,170,170,0.7)}

#status{
  margin-top:15px;
  text-align:center;
  font-weight:600;
  font-size:14px;
  min-height:22px;
  color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,0.4);
}

.ok{color:#a5d6a7}
.gagal{color:#ef9a9a}

/* Tombol back tengah bawah */
.back-btn{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.3);
  color:#fff;
  padding:12px 28px;
  border-radius:50px;
  font-weight:600;
  font-size:15px;
  text-decoration:none;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
  transition:0.2s;
}

.back-btn:active{
  transform:translateX(-50%) scale(0.95);
  background:rgba(255,255,255,0.3);
}
</style>
</head>
<body>
<div class="box">
  <h2>💰 Input Pembayaran Iuran</h2>

  <label>No Rumah</label>
  <select id="noRumah">
    <option value="">-- Pilih --</option>
    <script>
    for(let i=1;i<=92;i++){
      let no = 'AC' + String(i).padStart(2,'0');
      document.write(`<option value="${no}">${no}</option>`);
    }
    </script>
  </select>

  <label>Bulan yang dibayar:</label>
  <div class="grid" id="bulanGrid"></div>

  <button class="btn" id="btn" onclick="simpan()">Simpan</button>
  <div id="status"></div>
</div>

<a href="pengurus.html" class="back-btn">← Kembali</a>

<script>
const URL = 'https://script.google.com/macros/s/AKfycbxdJoK0PS94NAqBmaNeG9zDFoH3qNbjfae-MyzEeRrovpnuWGBAQcR74wadmU67sDPY9w/exec';

const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const short = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

bulan.forEach((b,i)=>{
  document.getElementById('bulanGrid').innerHTML += `<label><input type="checkbox" value="${b}">${short[i]}</label>`;
});

function simpan(){
  const no = document.getElementById('noRumah').value;
  const bulanDipilih = [...document.querySelectorAll('input:checked')].map(x=>x.value);
  const btn = document.getElementById('btn');
  const st = document.getElementById('status');

  if(!no){alert('Pilih No Rumah dulu');return;}
  if(!bulanDipilih.length){alert('Centang bulan dulu');return;}

  btn.disabled = true;
  st.className = '';
  st.innerText = 'Menyimpan...';

  fetch(URL,{
    method:'POST',
    body:JSON.stringify({no:no,bulan:bulanDipilih})
  })
.then(r=>r.text())
.then(txt=>{
    let res;
    try{res = JSON.parse(txt)} catch(e){res = {s:'gagal',m:txt}}
    st.innerText = res.m || txt;
    st.className = res.s=='ok'?'ok':'gagal';
    if(res.s=='ok'){
      document.querySelectorAll('input:checked').forEach(x=>x.checked=false);
      document.getElementById('noRumah').value='';
    }
    btn.disabled = false;
  })
.catch(e=>{
    st.innerText = 'Error: '+e.message;
    st.className = 'gagal';
    btn.disabled = false;
  });
}

// ===== REGISTER SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('✅ Service Worker registered!'))
    .catch(err => console.log('❌ Service Worker failed:', err));
}
</script>
</body>
</html>
