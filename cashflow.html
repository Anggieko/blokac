<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashflow Blok AC</title>

<!-- ===== PWA META TAGS ===== -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Info Blok AC">
<meta name="theme-color" content="#0f9b8e">
<link rel="apple-touch-icon" href="logoAC.png">


<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background:url('./bg.png') center/cover no-repeat;;
  padding: 16px 16px 160px 16px;
  min-height: 100vh;
}
.header {
  color: white;
  text-align: center;
  margin-bottom: 20px;
}
.header h1 { font-size: 21px; }
.loading {
  text-align: center;
  color: white;
  padding: 60px 20px;
}

/* Card tabel per bulan */
.card {
  background: white;
  border-radius: 16px;
  padding: 14px 12px;
  margin-bottom: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.12);
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  gap: 8px;
  align-items: center;
}
.card.header-row {
  background: rgba(255,255,255,0.95);
  font-weight: 700;
  font-size: 12px;
  color: #0f9b8e;
  text-align: center;
  padding: 10px 12px;
}
.cell {
  font-size: 13px;
  text-align: center;
  word-break: break-word;
}
.cell.bulan {
  text-align: left;
  font-weight: 700;
  color: #0f9b8e;
  font-size: 14px;
}
.cell.masuk { color: #2d7a2d; font-weight: 700; }
.cell.keluar { color: #d63031; font-weight: 700; }
.cell.total { color: #0f9b8e; font-weight: 800; font-size: 14px; }
.kosong { color: #ccc; font-weight: 400; }

/* Tombol bawah */
.btn-wrap {
  position: fixed;
  bottom: 20px;
  left: 0;
  right: 0;
  display: flex;
  gap: 10px;
  justify-content: center;
  padding: 0 16px;
}
.btn {
  flex: 1;
  max-width: 180px;
  background: white;
  color: #0f9b8e;
  border: none;
  padding: 14px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  cursor: pointer;
}
.btn.rincian {
  background: #ff7675;
  color: white;
}
.btn:active {
  transform: scale(0.96);
}
</style>
</head>
<body>

<div class="header">
  <h1>📊 Cashflow Blok AC</h1>
</div>

<div id="loading" class="loading">⏳ Mengambil data...</div>
<div id="listCashflow"></div>

<!-- Tombol bawah -->
<div class="btn-wrap">
  <button class="btn" onclick="window.location.href='menuu.html?v='+Date.now()">← Kembali</button>
  <button class="btn rincian" onclick="window.location.href='rincian1.html?v='+Date.now()">📝 Rincian</button>
</div>

<script>
// ===== FORCE NO-CACHE =====
const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRPZgiz_LwWsUTbv5MiI6W5qPSlugTAs1hb8HfhHMSaz4QS4iM4hHjxkWguohzLEB3zTNWyfFooUEIU/pub?gid=0&single=true&output=csv&t=' + Date.now();

function formatRupiah(str) {
  if(!str || str.trim() === '') return '<span class="kosong">-</span>';
  let angka = str.replace(/Rp|\s/g, '').replace(/\./g, '').replace(/,/g, '');
  if(isNaN(angka)) return str;
  return 'Rp' + Number(angka).toLocaleString('id-ID');
}

function parseCSV(csv) {
  const lines = csv.split('\n');
  const result = [];
  for(let i = 1; i < lines.length; i++) {
    let line = lines[i].trim();
    if(!line) continue;
    let cols = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || line.split(',');
    cols = cols.map(c => c.replace(/^"|"$/g, '').trim());
    if(cols.length >= 4) {
      result.push({
        bulan: cols[0],
        masuk: cols[1],
        keluar: cols[2],
        total: cols[3]
      });
    }
  }
  return result;
}

fetch(sheetURL, { cache: 'no-cache' })
.then(res => res.text())
.then(csv => {
    const data = parseCSV(csv);
    const container = document.getElementById('listCashflow');

    let html = `
      <div class="card header-row">
        <div class="cell">Bulan</div>
        <div class="cell">Pemasukan</div>
        <div class="cell">Pengeluaran</div>
        <div class="cell">Total Kas</div>
      </div>
    `;

    data.forEach(item => {
      if(!item.bulan) return;
      html += `
        <div class="card">
          <div class="cell bulan">${item.bulan}</div>
          <div class="cell masuk">${formatRupiah(item.masuk)}</div>
          <div class="cell keluar">${formatRupiah(item.keluar)}</div>
          <div class="cell total">${formatRupiah(item.total)}</div>
        </div>
      `;
    });

    document.getElementById('loading').style.display = 'none';
    container.innerHTML = html;
  })
.catch(err => {
    document.getElementById('loading').innerHTML = '❌ Gagal load data';
    console.error(err);
  });

// ===== REGISTER SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('✅ Service Worker registered!'))
    .catch(err => console.log('❌ Service Worker failed:', err));
}
</script>

</body>
</html>
