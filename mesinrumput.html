<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Mesin Rumput</title>
<style>
body{background:#0f172a;color:white;font-family:sans-serif;padding:20px;text-align:center}
input,button{width:100%;padding:14px;margin:10px 0;border-radius:10px;border:none;font-size:16px}
button{background:#3b82f6;color:white;font-weight:bold}
#reader{width:100%;max-width:400px;margin:20px auto;border-radius:12px;overflow:hidden;display:none}
</style>
</head>
<body>

<h2>🛠️ Scan Mesin Rumput</h2>

<form id="f">
  <input name="nama" placeholder="Nama Peminjam" required>
  <input name="blok" value="Blok AC" required>
  <input name="wa" placeholder="Nomor HP/WA" required>
  <input name="mesin" id="mesin" placeholder="ID Mesin - hasil scan" readonly required>
  
  <button type="button" onclick="mulaiScan()">📷 Scan Barcode</button>
  <div id="reader"></div>
  
  <button type="submit">Simpan Log</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
const URL = 'https://script.google.com/macros/s/AKfycbyUh9dPq5vpUiHHeqrtZsxZwfg6p-XUIZByNRUtRqbXc5beFJzNaUsm0HirQudVB8Ml/exec'; // GANTI INI
let html5QrCode;

function mulaiScan(){
  document.getElementById('reader').style.display='block';
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    {facingMode:"environment"},
    {fps:10, qrbox:250},
    (decodedText)=>{
      document.getElementById('mesin').value = decodedText;
      html5QrCode.stop();
      document.getElementById('reader').style.display='none';
    },
    ()=>{}
  ).catch(err=>alert('Gagal buka kamera: '+err));
}

document.getElementById('f').onsubmit = async e=>{
  e.preventDefault();
  let res = await fetch(URL, {method:'POST', body:new FormData(e.target)});
  alert(await res.text());
  if(await res.text()=='OK') e.target.reset();
}
</script>
</body>
</html>
