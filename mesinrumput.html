<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Peralatan Blok AC</title>

<!-- ===== PWA META TAGS ===== -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Info Blok AC">
<meta name="theme-color" content="#0f9b8e">

<style>
* {box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:url('bg.png') no-repeat center fixed;
  background-size:cover;
  font-family:'Segoe UI',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;color:white
}

.card{
  width:100%;max-width:420px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:24px;
  padding:30px 25px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3)
}

h2{text-align:center;margin-bottom:25px;font-weight:600}

input{
  width:100%;padding:14px;margin:10px 0;
  border-radius:12px;border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.15);color:white;font-size:16px;outline:none
}
input::placeholder{color:rgba(255,255,255,0.7)}
input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.3)}

button{
  width:100%;padding:15px;margin:12px 0;
  border-radius:12px;border:none;font-size:16px;font-weight:bold;
  cursor:pointer;transition:0.2s
}
.btn-scan{background:#3b82f6;color:white}
.btn-scan:active{transform:scale(0.97)}
.btn-save{background:#22c55e;color:white}
.btn-save:active{transform:scale(0.97)}
.btn-back{
  background:rgba(255,255,255,0.2);color:white;
  width:auto;padding:12px 30px;margin-top:20px
}

#reader{width:100%;margin:15px 0;border-radius:16px;overflow:hidden;display:none}

/* POPUP */
.popup{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);
  display:none;align-items:center;justify-content:center;z-index:999
}
.popup.show{display:flex;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.popup-box{
  background:rgba(255,255,255,0.15);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.2);
  padding:35px 30px;border-radius:20px;text-align:center;
  max-width:320px;animation:scaleIn 0.3s
}
@keyframes scaleIn{from{transform:scale(0.8)}to{transform:scale(1)}}
.popup-box h3{font-size:22px;margin-bottom:10px}
.popup-box p{opacity:0.9;margin-bottom:20px}
/* CARD TABEL LOG */
.card-log{
  max-width:900px;
  overflow-x:auto; /* biar bisa geser ke samping kalo kolom banyak */
}
.card-log h3{text-align:center;margin-bottom:15px}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  min-width:500px;
}
th,td{
  padding:10px 8px;
  text-align:left;
  vertical-align:top; /* rata atas biar rapi */
  border-bottom:1px solid rgba(255,255,255,0.12);
  word-wrap:break-word; /* pecah kata kalo kepanjangan */
  white-space:normal; /* wrap otomatis */
}

/* KOLOM TANGGAL BIAR GA LEBAR BANGET */
td:nth-child(1), th:nth-child(1){
  white-space:nowrap; /* tanggal jangan di wrap */
  width:110px;
}

/* HEADER NEMPEL PAS SCROLL */
th{
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:2;
}

/* ZEBRA STRIP Biar gampang bedain baris */
tr:nth-child(even) td{
  background:rgba(255,255,255,0.05);
}
tr:hover td{
  background:rgba(255,255,255,0.12);
  transition:0.2s;
}
</style>
</head>
<body>

<div class="card">
  <h2>🛠️ Scan Peralatan Blok AC</h2>
  <form id="f">
    <input name="nama" placeholder="Nama" required>
    <input name="blok" value="Blok AC" required>
    <input name="wa" placeholder="Nomor HP/WA" required>
    <input name="mesin" id="mesin" placeholder="ID Peralatan - hasil scan" readonly required>
    
    <button type="button" class="btn-scan" onclick="mulaiScan()">📷 Scan Barcode</button>
    <div id="reader"></div>
    
    <button type="submit" class="btn-save">Simpan Log</button>
  </form>
  

</div>

<!-- POPUP SUKSES -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h3>✅ Berhasil!</h3>
    <p>Data berhasil disimpan ke Sheet</p>
    <button class="btn-save" onclick="tutupPopup()">OK</button>
  </div>
</div>
<br>
<div class="card card-log">
<h3>📋 Log Terbaru</h3>
<div id="tabelLog">Loading data...</div>
</div>

  <div style="text-align:center">
<button class="btn-back" onclick="window.location.href='peralatan.html'">⬅️ Kembali</button>
  </div>


<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
const URL = 'https://script.google.com/macros/s/AKfycbyUh9dPq5vpUiHHeqrtZsxZwfg6p-XUIZByNRUtRqbXc5beFJzNaUsm0HirQudVB8Ml/exec'; // GANTI INI
let html5QrCode;

function mulaiScan(){
  document.getElementById('reader').style.display='block';
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    {facingMode:"environment"},
    {fps:10, qrbox:250},
    (decodedText)=>{
      document.getElementById('mesin').value = decodedText;
      html5QrCode.stop();
      document.getElementById('reader').style.display='none';
    },
    ()=>{}
  ).catch(err=>alert('Gagal buka kamera: '+err));
}

document.getElementById('f').onsubmit = async e=>{
  e.preventDefault();
  let res = await fetch(URL, {method:'POST', body:new FormData(e.target)});
  let txt = await res.text();
  if(txt=='OK'){
    document.getElementById('popup').classList.add('show');
    e.target.reset();
  } else {
    alert('Error: ' + txt);
  }
}

function tutupPopup(){
  document.getElementById('popup').classList.remove('show');
}

// ===== REGISTER SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('✅ Service Worker registered!'))
    .catch(err => console.log('❌ Service Worker failed:', err));
}
</script>
<script>
// LINK CSV DARI GOOGLE SHEET LU - PUBLISH DULU
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR1jQ3GzwVjjc1um7jMxfOAMh8g3ohPWHJ3mzr1lDpAQgLN27cnJPdhHYJFgulbcx2ZVPlPQHuYx1fE/pub?gid=0&single=true&output=csv';

// LOAD TABEL OTOMATIS PAS BUKA HALAMAN
fetch(CSV_URL)
.then(res => res.text())
.then(csv => {
  const rows = csv.split('\n').filter(r => r.trim() != ''); // buang baris kosong
  let html = '<table>';
  rows.forEach((row, i) => {
    // split CSV yg bener, handle koma di dalam kutip
    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || row.split(',');
    html += '<tr>';
    cols.forEach((cell, idx) => {
      cell = cell.replace(/"/g, '').trim(); // buang kutip + spasi
      html += i == 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  document.getElementById('tabelLog').innerHTML = html;
})
.catch(err => {
  document.getElementById('tabelLog').innerHTML = 'Gagal load data';
});

// FUNCTION LU YG LAMA TETEP DISINI
function scanBarcode(){ alert('Panggil scanner lu disini') }
function simpanLog(){ alert('Simpan ke sheet lu disini') }
</script>

</body>
</html>
