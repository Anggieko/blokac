<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Pemakaian Mesin</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, BlinkMacSystemFont, sans-serif; }
  body {
    min-height:100vh;
    background: url('bg.png') no-repeat center/cover;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
 .glass {
    width:100%; max-width:380px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.3);
    border-radius:25px;
    padding:25px 20px;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    color:#fff;
  }
  h2 {
    text-align:center; margin-bottom:20px;
    font-size:18px; font-weight:600;
  }
  input {
    width:100%; padding:14px; margin:8px 0;
    border:none; border-radius:12px;
    background:rgba(255,255,255,0.9);
    color:#333; font-size:15px; outline:none;
  }
  input::placeholder { color:#888; }
  input[readonly] { background:rgba(255,255,255,0.7); }

  #reader { display:none; margin:10px 0; border-radius:15px; overflow:hidden; }

 .btn-scan {
    width:100%; padding:14px; margin:10px 0;
    border:none; border-radius:12px;
    background:#ff5722; color:#fff;
    font-weight:bold; font-size:15px;
    cursor:pointer;
  }
 .btn-simpan {
    width:100%; padding:14px; margin-top:5px;
    border:none; border-radius:12px;
    background:#2196f3; color:#fff;
    font-weight:bold; font-size:15px;
    cursor:pointer;
  }
 .btn-back {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    padding:12px 30px; border:none; border-radius:50px;
    background:rgba(0,0,0,0.7); color:#fff;
    font-weight:bold; font-size:14px;
  }
</style>
</head>
<body>
  <div class="glass">
    <h2>📋 Log Pemakaian Mesin</h2>
    <form id="formLog">
      <input id="nama" placeholder="Nama Pemakai" required>
      <input id="blok" value="Blok AC" required>
      <input id="hp" placeholder="Nomor HP / WA" required>

      <button type="button" class="btn-scan" onclick="mulaiScan()">📷 Scan Barcode Mesin</button>
      <div id="reader"></div>
      <input id="mesin" placeholder="ID Mesin hasil scan" required readonly>

      <button type="submit" class="btn-simpan">Simpan Log</button>
    </form>
  </div>

  <button class="btn-back" onclick="history.back()">⬅️ Kembali</button>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxvSlQ7nsApCTHgWIw4ixLuOP3a-uM7zJLqD1NG1L6JWQ65CitWv3SdVgzQuXcTODdw/exec";
let scanner;

function mulaiScan(){
  document.getElementById("reader").style.display = "block";
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 200 },
    qrCodeMessage => {
      document.getElementById("mesin").value = qrCodeMessage;
      scanner.stop();
      document.getElementById("reader").style.display = "none";
    },
    error => {}
  );
}

document.getElementById("formLog").addEventListener("submit", function(e){
  e.preventDefault();
  let btn = document.querySelector(".btn-simpan");
  btn.disabled = true;
  btn.innerText = "Menyimpan...";

  let data = {
    nama: document.getElementById("nama").value,
    blok: document.getElementById("blok").value,
    hp: document.getElementById("hp").value,
    mesin: document.getElementById("mesin").value
  };

  fetch(URL_SCRIPT, {
    method: "POST",
    body: JSON.stringify(data)
  })
 .then(res => res.json())
 .then(() => {
    alert("✅ data udah tersimpan mesin di jaga ya");
    document.getElementById("formLog").reset();
    document.getElementById("blok").value = "Blok AC";
    btn.disabled = false;
    btn.innerText = "Simpan Log";
  })
 .catch(() => {
    alert("❌ Gagal simpan. Cek internet/link Apps Script");
    btn.disabled = false;
    btn.innerText = "Simpan Log";
  });
});
</script>
</body>
</html>
