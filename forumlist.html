<!DOCTYPE html>
<html>
<head>
  <title>Menu Notulensi</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      margin:0;
      padding:20px 20px 100px 20px;
      font-family:sans-serif;
      min-height:100vh;
      background:url('bg.png') no-repeat center fixed;
      background-size:cover;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:15px;
      max-width:900px;
      width:100%;
    }

    .card{
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:20px;
      padding:30px 15px;
      text-align:center;
      text-decoration:none;
      color:white;
      box-shadow:0 8px 32px 0 rgba(31,38,135,0.2);
      transition:transform 0.2s;
    }
    .card:active{transform:scale(0.95)}

    .icon{font-size:40px;margin-bottom:10px}
    .title{font-weight:bold;font-size:16px}

    .back-btn{
      position:fixed;
      bottom:25px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.4);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.3);
      color:white;
      padding:12px 28px;
      border-radius:50px;
      text-decoration:none;
      font-weight:bold;
      font-size:15px;
      box-shadow:0 4px 20px rgba(0,0,0,0.3);
      transition:transform 0.2s;
    }
    .back-btn:active{transform:translateX(-50%) scale(0.95)}

    @media(max-width:600px){
      .container{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="card" href="arsip.html">
      <div class="icon">📁</div>
      <div class="title">Arsip Notulensi</div>
    </a>

   <div class="card" onclick="openPin()">
  <div class="icon">📝</div>
  <div class="title">Catatan Rapat<br>
(Khusus Pengurus)</div>
</div>

    <a class="card" href="daftarhadir.html">
      <div class="icon">👥</div>
      <div class="title">Daftar Hadir</div>
    </a>
  </div>
<!-- POPUP PIN KACA -->
<div id="pinPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); z-index:9999; align-items:center; justify-content:center;">
  <div style="background:rgba(255,255,255,0.85); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.3); border-radius:24px; padding:28px 22px; width:85%; max-width:340px; box-shadow:0 8px 32px rgba(0,0,0,0.3); text-align:center;">
    <h3 style="color:white; margin-bottom:20px; text-shadow:0 2px 8px rgba(0,0,0,0.4);">🔐 PIN Pengurus</h3>
    <input type="password" id="pinInput" placeholder="Masukkan PIN" maxlength="6" style="width:100%; padding:14px; background:rgba(255,255,255,0.2); border:1.5px solid rgba(255,255,255,0.4); border-radius:14px; color:white; font-size:18px; text-align:center; letter-spacing:8px; outline:none; margin-bottom:20px;">
    <div style="display:flex; gap:12px;">
      <button onclick="closePin()" style="flex:1; padding:12px; background:rgba(156,163,175,0.7); border:1px solid rgba(255,255,255,0.25); border-radius:14px; color:white; font-weight:700;">Batal</button>
      <button onclick="checkPin()" style="flex:1; padding:12px; background:rgba(34,197,94,0.85); border:1px solid rgba(255,255,255,0.25); border-radius:14px; color:white; font-weight:700;">Masuk</button>
    </div>
    <p id="pinError" style="color:#ff6b6b; font-size:13px; margin-top:12px; display:none;">PIN salah bang!</p>
  </div>
</div>
<script>
  // GANTI PIN INI SESUAI LU MAU
  const PIN_PENGURUS = "000000"; 

  function openPin(){
    document.getElementById('pinPopup').style.display = 'flex';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinError').style.display = 'none';
    document.getElementById('pinInput').focus();
  }

  function closePin(){
    document.getElementById('pinPopup').style.display = 'none';
  }

  function checkPin(){
    let pin = document.getElementById('pinInput').value;
    if(pin === PIN_PENGURUS){
      // PIN bener -> langsung ke input notulensi
      window.location.href = 'rapat.html';
    } else {
      // PIN salah
      document.getElementById('pinError').style.display = 'block';
      document.getElementById('pinInput').value = '';
    }
  }

  // Enter buat submit PIN
  document.getElementById('pinInput').addEventListener('keypress', function(e){
    if(e.key === 'Enter') checkPin();
  });
</script>

  <!-- TOMBOL KEMBALI KE MENU -->
  <a class="back-btn" href="menuu.html">kembali</a>
</body>
</html>
