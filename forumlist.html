<!DOCTYPE html>
<html>
<head>
  <title>Menu Notulensi</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      margin:0;
      padding:20px 20px 100px 20px;
      font-family:sans-serif;
      min-height:100vh;
      background:url('bg.png') no-repeat center fixed;
      background-size:cover;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow-x: hidden;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:15px;
      max-width:900px;
      width:100%;
    }

    .card{
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:20px;
      padding:30px 15px;
      text-align:center;
      text-decoration:none;
      color:white;
      box-shadow:0 8px 32px 0 rgba(31,38,135,0.2);
      transition:transform 0.2s;
      cursor: pointer;
    }
    .card:active{transform:scale(0.95)}

    .icon{font-size:40px;margin-bottom:10px}
    .title{font-weight:bold;font-size:16px}

    .back-btn{
      position:fixed;
      bottom:25px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.4);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.3);
      color:white;
      padding:12px 28px;
      border-radius:50px;
      text-decoration:none;
      font-weight:bold;
      font-size:15px;
      box-shadow:0 4px 20px rgba(0,0,0,0.3);
      transition:transform 0.2s;
    }
    .back-btn:active{transform:translateX(-50%) scale(0.95)}

    /* --- SETUP ANIMASI POPUP --- */
    .popup-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .popup-content {
      background: rgba(255,255,255,0.9);
      border-radius: 24px;
      padding: 30px 24px;
      width: 85%;
      max-width: 340px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      text-align: center;
      transform: translateX(100vw); 
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.25);
    }

    .popup-overlay.show { opacity: 1; pointer-events: auto; }
    .popup-overlay.show .popup-content { transform: translateX(0); }

    /* --- LOADING OVERLAY --- */
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      z-index: 10000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .spinner {
      width: 50px; height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top: 5px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    @media(max-width:600px){ .container{grid-template-columns:1fr} }
  </style>
</head>
<body>

  <div class="container">
    <a class="card" href="daftarhadir.html">
      <div class="icon">📋</div>
      <div class="title">Daftar Hadir</div>
    </a>

    <div class="card" onclick="openPin()">
      <div class="icon">📝</div>
      <div class="title">Catatan Rapat<br>(Khusus Pengurus)</div>
    </div>

    <div class="card" onclick="goToVoting()">
      <div class="icon">🗳️</div>
      <div class="title">Voting</div>
    </div>

    <a class="card" href="galeri.html">
      <div class="icon">📒</div>
      <div class="title">Galeri</div>
    </a>

    <a class="card" href="arsip.html">
      <div class="icon">🗂️</div>
      <div class="title">Arsip Notulensi</div>
    </a>
  </div>

  <div id="pinPopup" class="popup-overlay">
    <div class="popup-content">
      <h3 style="color:#222; margin-top:0;">🔐 PIN Pengurus</h3>
      <input type="password" id="pinInput" placeholder="******" maxlength="6" style="width:100%; padding:14px; background:rgba(0,0,0,0.05); border:1.5px solid rgba(0,0,0,0.1); border-radius:14px; text-align:center; letter-spacing:8px; margin-bottom:20px; box-sizing:border-box; font-weight:bold;">
      <div style="display:flex; gap:12px;">
        <button onclick="closePin()" style="flex:1; padding:13px; background:#9ca3af; border:none; border-radius:14px; color:white; cursor:pointer;">Batal</button>
        <button onclick="checkPin()" style="flex:1; padding:13px; background:#22c55e; border:none; border-radius:14px; color:white; cursor:pointer;">Masuk</button>
      </div>
      <p id="pinError" style="color:#ef4444; font-size:13px; margin-top:14px; display:none; font-weight:bold;">PIN salah bang!</p>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div style="font-weight:bold; font-size:18px;">Memuat Voting...</div>
  </div>

<script>
  const PIN_PENGURUS = "000000"; 

  function openPin(){
    document.getElementById('pinPopup').classList.add('show');
  }

  function closePin(){
    document.getElementById('pinPopup').classList.remove('show');
  }

  function checkPin(){
    let pin = document.getElementById('pinInput').value;
    if(pin === PIN_PENGURUS){
      window.location.href = 'rapat.html';
    } else {
      document.getElementById('pinError').style.display = 'block';
    }
  }

  // Fungsi Loading Voting
  function goToVoting() {
    document.getElementById('loading-overlay').style.display = 'flex';
    setTimeout(() => {
      window.location.href = 'voting.html';
    }, 300);
  }
</script>

  <a class="back-btn" href="menuu.html">kembali</a>
</body>
</html>
