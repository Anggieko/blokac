<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catatan Sipil Warga Blok AC</title>
  
  <!-- ===== PWA META TAGS ===== -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Info Blok AC">
  <meta name="theme-color" content="#0f9b8e">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: url('bg.png') no-repeat center fixed;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      color: white;
      padding: 20px 20px 100px 20px;
      display: flex;
      flex-direction: column;
    }

    .container {
      flex: 1;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 28px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
      font-weight: 700;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 420px;
      margin: 0 auto;
    }

    .menu-card {
      border-radius: 24px;
      padding: 25px 15px;
      text-align: center;
      color: #fff;
      height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 32px 0 rgba(0,0,0,0.4);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .menu-card:active {
      transform: scale(0.96);
    }

    .menu-card .icon {
      font-size: 42px;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    .menu-card .judul {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .menu-card .subjudul {
      font-size: 12px;
      opacity: 0.85;
    }

    /* Tombol Kembali bawah tengah - floating */
    .back-btn {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 35px;
      border-radius: 50px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 999;
    }

    .back-btn:active {
      transform: translateX(-50%) scale(0.94);
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Catatan Sipil Warga Blok AC</h1>
    
    <div class="menu-grid">
      <!-- Card Mesin Rumput --> 


      <a href="admac.html" class="menu-card">
        <div class="icon">🗂️</div>
        <div class="judul">Data Kependudukan</div>
        <div class="subjudul">Data Pribadi</div>
      </a>

      <!-- Card Peralatan Lain -->
     <a href="datalain.html" class="menu-card">
        <div class="icon">🗂️</div>
        <div class="judul">Data Keseluruhan</div>
        <div class="subjudul"></div>
      </a>
    </div>
  </div>

  <!-- Tombol Kembali di bawah tengah -->
<button class="back-btn" onclick="window.location.href='menuu.html'">
  ← Kembali
</button>

<!-- Modal PIN -->
<div id="modalPIN" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);z-index:999;align-items:center;justify-content:center">
  <div style="background:rgba(255,255,255,0.95);padding:30px;border-radius:20px;width:85%;max-width:320px;text-align:center">
    <h3 style="margin-bottom:15px;color:#2e7d32">Masukkan PIN</h3>
    <input type="password" id="pinInput" maxlength="6" placeholder="****" 
      style="width:100%;padding:12px;font-size:18px;text-align:center;letter-spacing:8px;border:2px solid #ddd;border-radius:10px">
    <p id="pinError" style="color:red;font-size:13px;margin-top:8px;height:18px"></p>
    <button onclick="validasiPIN()" style="width:100%;padding:12px;background:#2e7d32;color:#fff;border:none;border-radius:10px;font-weight:700;margin-top:10px">Buka</button>
    <button onclick="tutupPIN()" style="width:100%;padding:10px;background:#aaa;color:#fff;border:none;border-radius:10px;margin-top:8px">Batal</button>
  </div>
</div>

<script>
const PIN_BENAR = "000000"; // GANTI PIN LU

function cekPIN(){
  document.getElementById('modalPIN').style.display='flex';
  document.getElementById('pinInput').value='';
  document.getElementById('pinError').innerText='';
}

function tutupPIN(){
  document.getElementById('modalPIN').style.display='none';
}

function validasiPIN(){
  const pin = document.getElementById('pinInput').value;
  if(pin === PIN_BENAR){
    localStorage.setItem('pinOK', Date.now());
    window.location.href = 'inputiuran.html';
  } else {
    document.getElementById('pinError').innerText = 'PIN salah!';
    document.getElementById('pinInput').value='';
  }
}

document.getElementById('pinInput').addEventListener('keyup', function(e){
  if(e.key === 'Enter') validasiPIN();
});

// ===== REGISTER SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('✅ Service Worker registered!'))
    .catch(err => console.log('❌ Service Worker failed:', err));
}
</script>
</body>
</html>
