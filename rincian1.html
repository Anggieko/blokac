<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rincian Pengeluaran</title>

<!-- ===== PWA META TAGS ===== -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Info Blok AC">
<meta name="theme-color" content="#0f9b8e">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background:url('./bg.png') center/cover no-repeat;
  padding: 16px 16px 90px 16px;
  min-height: 100vh;
}
.header {
  color: white;
  text-align: center;
  margin-bottom: 20px;
}
.header h1 { font-size: 20px; }
.loading {
  text-align: center;
  color: white;
  padding: 60px 20px;
}
.kategori {
  font-size: 18px;
  font-weight: 700;
  color: white;
  margin: 24px 0 12px 0;
  padding-left: 4px;
}
.card {
  background: white;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.12);
}
.tanggal {
  font-size: 12px;
  color: #999;
  margin-bottom: 6px;
}
.keterangan {
  font-size: 14px;
  color: #333;
  margin-bottom: 8px;
  line-height: 1.4;
}
.nominal {
  font-size: 16px;
  font-weight: 700;
  color: #d63031;
  text-align: right;
}
.total-card {
  background: #0f9b8e;
  color: white;
  border-radius: 16px;
  padding: 16px;
  margin-top: 16px;
  text-align: center;
}
.total-card.label { font-size: 13px; opacity: 0.9; }
.total-card.value { font-size: 20px; font-weight: 800; margin-top: 4px; }

.rekap-box {
  margin: 20px 0;
  background: rgba(255,255,255,0.95);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.12);
}
.rekap-title {
  font-weight: 700;
  margin-bottom: 12px;
  color: #333;
  font-size: 16px;
}
.rekap-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 15px;
}
.rekap-row:last-child { margin-bottom: 0; }
.rekap-row span:last-child { font-weight: 700; }

.btn-wrap {
  position: fixed;
  bottom: 20px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  padding: 0 16px;
}
.btn {
  background: white;
  color: #0f9b8e;
  border: none;
  padding: 14px 34px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}
</style>
</head>
<body>

<div class="header">
  <h1>📝 Rincian Pengeluaran</h1>
</div>

<div id="loading" class="loading">⏳ Mengambil data...</div>

<div id="rekapTotal" class="rekap-box" style="display:none">
  <div class="rekap-title">💰 Rekap Total</div>
  <div class="rekap-row">
    <span>💙 Sosial</span>
    <span id="rekapSosial">Rp0</span>
  </div>
  <div class="rekap-row">
    <span>🔧 Fasilitas</span>
    <span id="rekapFasilitas">Rp0</span>
  </div>
  <div class="rekap-row">
    <span>🚨 Dana Darurat</span>
    <span id="rekapDana">Rp0</span>
  </div>
</div>

<div id="listRincian"></div>

<div class="btn-wrap">
  <button class="btn" onclick="window.location.href='cashflow.html?v='+Date.now()">← Kembali</button>
</div>

<script>
// ===== FORCE NO-CACHE =====
const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRPZgiz_LwWsUTbv5MiI6W5qPSlugTAs1hb8HfhHMSaz4QS4iM4hHjxkWguohzLEB3zTNWyfFooUEIU/pub?gid=1984994553&single=true&output=csv&t=' + Date.now();

function formatRupiah(str) {
  if(!str || str.trim() === '' || str === 'Rp0') return 'Rp0';
  let angka = str.replace(/Rp|\s/g, '').replace(/\./g, '').replace(/,/g, '');
  if(isNaN(angka) || angka === '') return str.trim();
  return 'Rp' + Number(angka).toLocaleString('id-ID');
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;

  for(let i = 0; i < line.length; i++) {
    let char = line[i];
    if(char === '"') {
      inQuotes =!inQuotes;
    } else if(char === ',' &&!inQuotes) {
      result.push(current.trim());
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current.trim());
  return result;
}

function parseCSV(csv) {
  const lines = csv.split('\n');
  const data = { sosial: [], fasilitas: [], dana: [], total: {sosial:'0', fasilitas:'0', dana:'0'} };

  for(let i = 1; i < lines.length; i++) {
    let line = lines[i].trim();
    if(!line) continue;

    let cols = parseCSVLine(line);
    if(cols.length < 12) continue;

    for(let j = 0; j < cols.length; j++) {
  let isi = cols[j]?.toLowerCase().trim();
  if(isi?.includes('total sosial')) {
    data.total.sosial = cols[j+1] || '0'; // ambil kolom sebelah kanannya
    break;
  }
}
for(let j = 0; j < cols.length; j++) {
  let isi = cols[j]?.toLowerCase().trim();
  if(isi?.includes('total fasilitas')) {
    data.total.fasilitas = cols[j+1] || '0';
    break;
  }
}
for(let j = 0; j < cols.length; j++) {
  let isi = cols[j]?.toLowerCase().trim();
  if(isi?.includes('total dana darurat')) {
    data.total.dana = cols[j+1] || '0';
    break;
  }
}

    // SOSIAL kolom A,B,C
    if(cols[0] && cols[1] && cols[2] &&!cols[0].toLowerCase().includes('tanggal')) {
      data.sosial.push({ tgl: cols[0], ket: cols[1], nom: cols[2] });
    }
    // FASILITAS kolom D,E,F
    if(cols[3] && cols[4] && cols[5] &&!cols[3].toLowerCase().includes('tanggal')) {
      data.fasilitas.push({ tgl: cols[3], ket: cols[4], nom: cols[5] });
    }
    // DANA DARURAT kolom G,H,I
    if(cols[6] && cols[7] && cols[8] &&!cols[6].toLowerCase().includes('tanggal')) {
      data.dana.push({ tgl: cols[6], ket: cols[7], nom: cols[8] });
    }
  }
  return data;
}

function buatCard(item) {
  return `
    <div class="card">
      <div class="tanggal">${item.tgl}</div>
      <div class="keterangan">${item.ket}</div>
      <div class="nominal">${formatRupiah(item.nom)}</div>
    </div>
  `;
}

fetch(sheetURL, { cache: 'no-cache' })
.then(res => res.text())
.then(csv => {
    const data = parseCSV(csv);
    const container = document.getElementById('listRincian');
    let html = '';

    // TAMPILIN REKAP TOTAL DI ATAS
    if(data.total.sosial!== '0' || data.total.fasilitas!== '0' || data.total.dana!== '0') {
      document.getElementById('rekapTotal').style.display = 'block';
      document.getElementById('rekapSosial').innerText = formatRupiah(data.total.sosial);
      document.getElementById('rekapFasilitas').innerText = formatRupiah(data.total.fasilitas);
      document.getElementById('rekapDana').innerText = formatRupiah(data.total.dana);
    }

    if(data.sosial.length > 0) {
      html += `<div class="kategori">💙 Sosial</div>`;
      data.sosial.forEach(item => html += buatCard(item));
      html += `<div class="total-card"><div class="label">Total Sosial</div><div class="value">${formatRupiah(data.total.sosial)}</div></div>`;
    }

    if(data.fasilitas.length > 0) {
      html += `<div class="kategori">🔧 Fasilitas</div>`;
      data.fasilitas.forEach(item => html += buatCard(item));
      html += `<div class="total-card"><div class="label">Total Fasilitas</div><div class="value">${formatRupiah(data.total.fasilitas)}</div></div>`;
    }

    if(data.dana.length > 0) {
      html += `<div class="kategori">🚨 Dana Darurat</div>`;
      data.dana.forEach(item => html += buatCard(item));
      html += `<div class="total-card"><div class="label">Total Dana Darurat</div><div class="value">${formatRupiah(data.total.dana)}</div></div>`;
    }

    document.getElementById('loading').style.display = 'none';
    container.innerHTML = html;
  })
.catch(err => {
    document.getElementById('loading').innerHTML = '❌ Gagal load data';
    console.error(err);
  });

// ===== REGISTER SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('✅ Service Worker registered!'))
    .catch(err => console.log('❌ Service Worker failed:', err));
}
</script>

</body>
</html>
