<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keluhan Warga</title>

<!-- ===== PWA META TAGS ===== -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Info Blok AC">
<meta name="theme-color" content="#0f9b8e">
<link rel="apple-touch-icon" href="logo-AC.png">

<style>
body{
  margin:0;
  padding:20px;
  font-family:sans-serif;
  color:#fff;
  background:url('bg.png') no-repeat center fixed;
  background-size:cover;
  animation:slideInRight 0.5s ease-out;
}

@keyframes slideInRight{
  from{opacity:0; transform:translateX(100vw)}
  to{opacity:1; transform:translateX(0)}
}

.container{
  max-width:500px;
  margin:auto;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:20px;
  padding:25px;
  box-shadow:0 8px 32px 0 rgba(0,0,0,0.4);
  animation:slideInLeft 0.6s ease-out 0.2s backwards;
}

@keyframes slideInLeft{
  from{opacity:0; transform:translateX(-40px)}
  to{opacity:1; transform:translateX(0)}
}

h2{
  text-align:center;
  margin-top:0;
  text-shadow:0 2px 6px rgba(0,0,0,0.6);
}

.form-group{
  margin-bottom:18px;
}

label{
  display:block;
  margin-bottom:6px;
  font-weight:600;
  text-shadow:0 1px 3px rgba(0,0,0,0.6);
}

input, select, textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.15);
  color:#fff;
  font-size:15px;
  box-sizing:border-box;
  outline:none;
}

input::placeholder, textarea::placeholder{
  color:rgba(255,255,255,0.7);
}

.btn-kirim{
  width:100%;
  padding:14px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.btn-kirim:active{
  transform:scale(0.97);
}

.back-btn{
  display:block;
border:1px solid rgba(255,255,255,0.3);
  padding:12px 28px;
  border-radius:50px;
  color:#fff;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  text-align:center;
  margin-top:20px;
  color:#fff;
  text-decoration:none;
  opacity:0.9;
}

</style>
</head>
<body>

<div class="container">
  <h2>📢 Keluhan / Saran Warga</h2>
  
  <form id="formKeluhan">
    <div class="form-group">
      <label>Nama</label>
      <input type="text" id="nama" placeholder="Contoh: Thom Haye RT 05" required>
    </div>

    <div class="form-group">
      <label>Kategori</label>
      <select id="kategori" required>
        <option value="">-- Pilih Kategori --</option>
        <option value="Keluhan">Keluhan</option>
        <option value="Saran">Saran</option>
      </select>
    </div>

    <div class="form-group">
      <label>Subjek</label>
      <input type="text" id="subjek" placeholder="Contoh: Lampu jalan mati" required>
    </div>

    <div class="form-group">
      <label>Isi Laporan/Keluhan</label>
      <textarea id="isi" rows="4" placeholder="Jelaskan detail laporan/keluhan kamu..." required></textarea>
    </div>

    <button type="submit" class="btn-kirim">📤 Kirim langsung WhatsApp</button>
  </form>
</div>

<a href="menuu.html" class="back-btn">← Kembali</a>

<script>
document.getElementById('formKeluhan').addEventListener('submit', function(e){
  e.preventDefault(); // biar ga refresh
  
  const nama = document.getElementById('nama').value;
  const kategori = document.getElementById('kategori').value;
  const subjek = document.getElementById('subjek').value;
  const isi = document.getElementById('isi').value;
  
  // GANTI NOMOR ADMIN DI SINI - format 62 tanpa +
  const noWA = '6285861005494';
  
  const pesan = `*LAPORAN WARGA BLOK AC*\n\n` + 
    `Nama: ${nama}\n` + 
    `Kategori: ${kategori}\n` + 
    `Subjek: ${subjek}\n` + 
    `Isi:\n${isi}\n\n` + 
    `Dikirim via Aplikasi Blok AC`;
  
  const url = `https://wa.me/${noWA}?text=${encodeURIComponent(pesan)}`;
  
  // POP UP DULU
  alert('Laporan berhasil dibuat!\nSekarang diarahkan ke WhatsApp');
  
  // BARU BUKA WA
  window.location.href = url;
});

// ===== REGISTER SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('✅ Service Worker registered!'))
    .catch(err => console.log('❌ Service Worker failed:', err));
}
</script>

</body>
</html>
