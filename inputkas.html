    <meta charset="UTF-8">

    <title>Input Kas</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { 
    margin: 0; 
    padding: 20px; 
    /* Memastikan gambar dimuat dan menutupi layar */
    background: url('bg.png') no-repeat center center fixed; 
    background-size: cover; 
    
    /* Tambahan: Fallback warna jika gambar gagal dimuat */
    background-color: #2c3e50; 
    
    font-family: 'Segoe UI', sans-serif;
    display: flex; 
    flex-wrap: wrap; 
    justify-content: center; 
    gap: 20px;
    min-height: 100vh; /* Memastikan background memenuhi tinggi layar */
}

        .glass-card { 
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 30px; 
            border-radius: 25px; width: 320px; color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        input, select, button { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border-radius: 12px; border: none; box-sizing: border-box;
        }
        button { background: #27ae60; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }
        
        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%; width: 15px; height: 15px;
            animation: spin 1s linear infinite;
            display: inline-block; margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .back-btn{
            position:fixed; bottom:25px; left:50%; transform:translateX(-50%);
            background:rgba(255,255,255,0.2); backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.3); color:#fff;
            padding:12px 28px; border-radius:50px; text-decoration:none;
        }
        h1 { text-align:center; color:#fff; width: 100%; }
    </style>
</head>
<body>
    <h1>INPUT DATA KEUANGAN</h1>

    <div class="glass-card">
        <h3>Pemasukan</h3>
        <select id="bulanM"></select>
        <input type="number" id="nomM" placeholder="Nominal (Rp)">
        <button id="btnM" onclick="proses('Masuk')">Simpan Pemasukan</button>
    </div>

    <div class="glass-card">
        <h3>Pengeluaran</h3>
        <select id="bulanK"></select>
        <select id="katK">
            <option value="Sosial">Sosial</option>
            <option value="Fasilitas">Fasilitas</option>
            <option value="Dana Darurat">Dana Darurat</option>
        </select>
        <input type="text" id="ketK" placeholder="Keterangan">
        <input type="number" id="nomK" placeholder="Nominal (Rp)">
        <button id="btnK" onclick="proses('Keluar')">Simpan Pengeluaran</button>
    </div>

    <a href="pengurus.html" class="back-btn">← Kembali</a>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwBRwwYpPtIn_D71d9ER9o3u-nH9m9a-Ni3gxtKKCb_i0iPUYoGixBxhEWB9XF0NKc0Vw/exec";
        const bulanList = ["July 2026", "August 2026", "September 2026", "October 2026", "November 2026", "December 2026"];

        window.onload = () => {
            ['bulanM', 'bulanK'].forEach(id => {
                let el = document.getElementById(id);
                bulanList.forEach(b => {
                    let opt = document.createElement('option'); opt.value = b; opt.innerHTML = b;
                    el.appendChild(opt);
                });
            });
        };

        async function proses(jenis) {
            const btn = document.getElementById(jenis === 'Masuk' ? 'btnM' : 'btnK');
            const nominal = document.getElementById(jenis === 'Masuk' ? 'nomM' : 'nomK').value;

            if(!nominal) return alert("Mohon isi nominal!");

            // Ubah tampilan tombol jadi loading
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Menyimpan...';

            const data = {
                jenis: jenis,
                bulan: document.getElementById(jenis === 'Masuk' ? 'bulanM' : 'bulanK').value,
                nominal: nominal,
                keterangan: jenis === 'Keluar' ? document.getElementById('ketK').value : '-',
                kategori: jenis === 'Keluar' ? document.getElementById('katK').value : '-'
            };

            try {
                await fetch(GAS_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                alert("Data berhasil disimpan!");
                location.reload();
            } catch (error) {
                alert("Gagal menyimpan data.");
                btn.disabled = false;
                btn.innerHTML = 'Simpan ' + jenis;
            }
        }

        // ===== REGISTER SERVICE WORKER =====
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('✅ Service Worker registered!'))
            .catch(err => console.log('❌ Service Worker failed:', err));
        }
    </script>
</body>
</html>
