<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Kependudukan Warga Blok AC</title>
    
    <!-- ===== PWA META TAGS ===== -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Info Blok AC">
    <meta name="theme-color" content="#0f9b8e">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: url('bg.png') no-repeat center center fixed; background-size: cover; margin: 0; padding: 10px; color: #fff; }

        /* Style Warna Berdasarkan Kolom A */
        .row-mengontrak { background-color: rgba(255, 255, 0, 1) !important; color: black; } /* Kuning */
        .row-fukk { background-color: rgba(255, 0, 255, 1) !important; } /* Magenta/Ungu */
        .row-takeoveran { background-color: rgba(0, 255, 255, 1) !important; color: black; } /* Cyan */

        .stats-card { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); padding: 15px; border-radius: 15px; margin-bottom: 15px; width: 98vw; border: 1px solid rgba(255,255,255,0.2); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-radius: 15px; padding: 10px; width: 98vw; margin: 0 auto; }
        #searchInput { padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,1); color: white; width: 100%; margin-bottom: 10px; }
        .table-container { overflow: auto; max-height: 60vh; background: rgba(0, 0, 0, 0.3); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { background: rgba(0,0,0,1); padding: 10px; position: sticky; top: 0; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .footer-nav { text-align: center; margin-top: 15px; }
        .back-btn { background: rgba(255,255,255,0.2); padding: 8px 30px; border-radius: 50px; text-decoration: none; color: white; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="stats-area" class="stats-card"></div>

<div class="glass-card">
    <input type="text" id="searchInput" placeholder="Cari data warga...">
    <div class="table-container">
        <table id="tabelWarga">
            <thead><tr id="head-row"></tr></thead>
            <tbody id="body-rows"></tbody>
        </table>
    </div>
</div>

<div class="footer-nav">
    <a href="catatansipil.html" class="back-btn">← Kembali</a>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSysX9KjjRf4zJcntZvkaSJcqFxJxTCQkCtaM6kmCmss-7Emx-UqR8F7Cy6dLiPy15gaZRIOf4WAtyi/pub?gid=245370837&single=true&output=csv';

    Papa.parse(csvUrl, {
        download: true, header: false,
        complete: function(results) {
            const data = results.data;
            
            // Statistik
            for(let i = 4; i <= 9; i++) {
                if(data[i]) $('#stats-area').append(`<div class="stat-item">${data[i][11] || ''} <strong>${data[i][12] || ''}</strong></div>`);
            }

            // Render Header (Kolom A-K)
            data[0].forEach((h, i) => { if (i < 11) $('#head-row').append(`<th>${h}</th>`); });
            
            // Render Baris Data
            data.slice(1).forEach(row => {
                let cellA = (row[0] || "").toLowerCase();
                let rowClass = "";
                
                // Logika Warna Otomatis
                if (cellA.includes("mengontrak")) rowClass = "row-mengontrak";
                else if (cellA.includes("fu kk")) rowClass = "row-fukk";
                else if (cellA.includes("takeoveran")) rowClass = "row-takeoveran";

                let tr = `<tr class="${rowClass}">`;
                row.forEach((val, i) => {
                    if (i < 11) tr += `<td>${val || '-'}</td>`;
                });
                tr += '</tr>';
                $('#body-rows').append(tr);
            });
        }
    });

    $("#searchInput").on("keyup", function() {
        var value = $(this).val().toLowerCase();
        $("#body-rows tr").filter(function() {
            $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
        });
    });

    // ===== REGISTER SERVICE WORKER =====
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('✅ Service Worker registered!'))
        .catch(err => console.log('❌ Service Worker failed:', err));
    }
</script>
</body>
</html>
