<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Kependudukan Warga Blok AC</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: url('bg.png') no-repeat center center fixed; 
            background-size: cover; 
            margin: 0; padding: 10px; color: #fff;
        }

        /* Card Statistik (Kolom L, M, N) */
        .stats-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            width: 98vw;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.2);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-item { font-size: 0.8rem; }

        /* Main Card */
        .glass-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px; padding: 10px; width: 98vw; margin: 0 auto; 
        }

        #searchInput { 
            padding: 12px; border-radius: 8px; border: none; 
            background: rgba(255,255,255,0.2); color: white; width: 100%; margin-bottom: 10px;
        }

        /* Tabel */
        .table-container { overflow-y: auto; max-height: 65vh; background: rgba(0, 0, 0, 0.3); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { background: rgba(0,0,0,1); padding: 10px; position: sticky; top: 0; text-align: left; z-index: 10; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .footer-nav { text-align: center; margin-top: 15px; }
        .back-btn { background: rgba(255,255,255,0.2); padding: 8px 30px; border-radius: 50px; text-decoration: none; color: white; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="stats-area" class="stats-card"></div>

<div class="glass-card">
    <input type="text" id="searchInput" placeholder="🔎 Cari data warga...">
    <div class="table-container">
        <table id="tabelWarga">
            <thead><tr id="head-row"></tr></thead>
            <tbody id="body-rows"></tbody>
        </table>
    </div>
</div>

<div class="footer-nav">
    <a href="catatansipil.html" class="back-btn">← Kembali</a>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSysX9KjjRf4zJcntZvkaSJcqFxJxTCQkCtaM6kmCmss-7Emx-UqR8F7Cy6dLiPy15gaZRIOf4WAtyi/pub?gid=245370837&single=true&output=csv';

    Papa.parse(csvUrl, {
        download: true, header: false,
        complete: function(results) {
            const data = results.data;
            
            // 1. Ambil data statistik dari kolom L, M, N (index 11, 12, 13)
            for(let i = 4; i <= 9; i++) {
                if(data[i]) {
                    $('#stats-area').append(`<div class="stat-item">${data[i][11] || ''} <strong>${data[i][12] || ''}</strong></div>`);
                }
            }

            // 2. Render Header (Kecuali kolom L, M, N/indeks 11+)
            const headers = data[0]; 
            headers.forEach((h, index) => {
                if (index < 11) $('#head-row').append(`<th>${h}</th>`);
            });
            
            // 3. Render Baris Data (Kecuali kolom L, M, N/indeks 11+)
            data.slice(1).forEach(row => {
                let tr = '<tr>';
                row.forEach((val, index) => {
                    if (index < 11) tr += `<td>${val || '-'}</td>`;
                });
                tr += '</tr>';
                $('#body-rows').append(tr);
            });
        }
    });

    $("#searchInput").on("keyup", function() {
        var value = $(this).val().toLowerCase();
        $("#body-rows tr").filter(function() {
            $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
        });
    });
</script>
</body>
</html>
