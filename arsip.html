<!DOCTYPE html>
<html>
<head>
  <title>Arsip Notulensi</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
  margin:0;
  padding:20px 20px 100px 20px;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh;
  background:url('bg.png') no-repeat center fixed;
  background-size:cover;
}

h3{
  color:white;
  text-align:center;
  margin-bottom:25px;
  font-size:22px;
  text-shadow:0 2px 8px rgba(0,0,0,0.4);
}

.item{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:18px;
  padding:18px;
  margin-bottom:15px;
  box-shadow:0 8px 32px 0 rgba(31,38,135,0.2);
}

.tgl{
  font-weight:600;
  font-size:16px;
  color:white;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}

.btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:10px 18px;
  background:rgba(26,115,232,0.9);
  backdrop-filter:blur(5px);
  color:white;
  text-decoration:none;
  border-radius:12px;
  font-weight:600;
  font-size:14px;
  border:1px solid rgba(255,255,255,0.2);
  transition:transform 0.2s;
}
.btn:active{transform:scale(0.95)}

.back-btn{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.3);
  color:white;
  padding:12px 28px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  font-size:15px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  transition:transform 0.2s;
}
.back-btn:active{transform:translateX(-50%) scale(0.95)}
  </style>
</head>
<body>
  <h3>📁 Arsip Notulensi</h3>
  <div id="list">Loading...</div>
<a class="back-btn" href="forumlist.html">kembali</a>
  <script>
    // PAKE LINK PUBLISH TO WEB LU
    const LINK_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTF01EFJ7cJQlSXl5avLF5XaRLn4WL4WrmpW7FYOziXIBRiDtk137sR893c7GDedBC0h-GFZx8yjMMW/pub?gid=527019078&single=true&output=csv';

    fetch(LINK_CSV)
 .then(res => res.text())
 .then(csv => {
      const div = document.getElementById('list');
      let rows = csv.split('\n').filter(r => r.trim()!= '');
      rows.shift(); // buang header "tanggal,judul,link download pdf"

      if(rows.length == 0){
        div.innerHTML = 'Belum ada notulensi';
        return;
      }

      let html = '';
      rows.reverse().forEach(row => {
        let col = row.split(',');
        let tanggal = col[0]; // kolom A = tanggal
        let linkPdf = col[2]; // kolom C = link download pdf

        if(tanggal && linkPdf){
          html += `<div class="item">
            <div class="tgl">📅 Rapat ${tanggal}</div>
            <a class="btn" href="${linkPdf}" target="_blank">⬇️ Download PDF</a>
          </div>`;
        }
      });
      div.innerHTML = html;
    })
 .catch(err => {
      document.getElementById('list').innerHTML = 'Error: ' + err;
    });
  </script>
</body>
</html>
