<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Cloud Blok AC</title>
  
  <!-- ===== PWA META TAGS ===== -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Info Blok AC">
  <meta name="theme-color" content="#0f9b8e">
<link rel="apple-touch-icon" href="logo-AC.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: url('bg.png') no-repeat center fixed;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      color: white;
      padding: 20px 20px 100px 20px;
      display: flex;
      flex-direction: column;
    }

    .container {
      flex: 1;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 28px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
      font-weight: 700;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 420px;
      margin: 0 auto;
    }

    .menu-card {
      border-radius: 24px;
      padding: 25px 15px;
      text-align: center;
      color: #fff;
      height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 32px 0 rgba(0,0,0,0.4);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .menu-card:active {
      transform: scale(0.96);
    }

    .menu-card .icon {
      font-size: 42px;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    .menu-card .judul {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .menu-card .subjudul {
      font-size: 12px;
      opacity: 0.85;
    }

    /* Tombol Kembali bawah tengah - floating */
    .back-btn {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 35px;
      border-radius: 50px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 999;
    }

    .back-btn:active {
      transform: translateX(-50%) scale(0.94);
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Penyimpanan Cloud</h1>
    
    <div class="menu-grid">
      <!-- Card Mesin Rumput -->
      <a href="galeri.html" class="menu-card">
        <div class="icon">🗂️</div>
        <div class="judul">Galeri Blok AC</div>
        <div class="subjudul">Kumpulan Foto event</div>
      </a>
      <a href="arsip.html" class="menu-card">
        <div class="icon">🗂️</div>
        <div class="judul">Arsip Notulensi</div>
        <div class="subjudul">Catatan Rapat dan TTD warga Blok AC</div>
      </a>

      <!-- Card Peralatan Lain -->

    </div>
  </div>

  <!-- Tombol Kembali di bawah tengah -->
<button class="back-btn" onclick="window.location.href='menuu.html'">
  ← Kembali
</button>

<script>
// ===== REGISTER SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('✅ Service Worker registered!'))
    .catch(err => console.log('❌ Service Worker failed:', err));
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@vercel/analytics/dist/index.min.js"></script>
<script>
  window.va = window.va || function(){ (window.vaq = window.vaq || []).push(arguments); };
  va('send', 'pageview');
</script>
</body>
</html>
