<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lapor & Keluhan - Blok AC</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:url('bg.png') no-repeat center fixed; /* ganti ke bg.png */
  background-size:cover;
  padding:24px 16px 100px 16px;
  color:#fff;
  min-height:100vh;
}
.card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;
  padding:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
}
h2{margin:0 0 20px 0;font-size:20px;font-weight:800;text-align:center}

.form-group{margin-bottom:16px}
label{
  display:block;
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  opacity:0.9;
}
input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.15);
  color:#fff;
  font-size:14px;
  box-sizing:border-box;
  font-family:inherit;
}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.6)}
select option{color:#000}

.btn-kirim{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#25D366,#128C7E);
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
  box-shadow:0 4px 12px rgba(37,211,102,0.4);
}
.btn-kirim:active{transform:scale(0.98)}

/* Tombol back bawah tengah */
.back-btn{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.3);
  padding:12px 28px;
  border-radius:50px;
  color:#fff;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}
.back-btn:active{transform:translateX(-50%) scale(0.95)}
</style>
</head>
<body>

<div class="card">
  <h2>📝 Lapor & Keluhan</h2>
  
  <form id="formLapor">
    <div class="form-group">
      <label>Nama Lengkap</label>
      <input type="text" id="nama" placeholder="Contoh: Thom Haye RT05/12" required>
    </div>
    
    <div class="form-group">
      <label>Kategori</label>
      <select id="kategori" required>
        <option value="">Pilih kategori</option>
        <option value="Laporan">Laporan</option>
        <option value="Keluhan">Keluhan</option>
        <option value="Saran">Saran</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Subjek</label>
      <input type="text" id="subjek" placeholder="Contoh: Lampu jalan mati" required>
    </div>
    
    <div class="form-group">
      <label>Isi Laporan/Keluhan</label>
      <textarea id="isi" rows="4" placeholder="Jelaskan detail laporan/keluhan kamu..." required></textarea>
    </div>
    
    <button type="submit" class="btn-kirim">📤 Kirim langsung WhatsApp </button>
  </form>
</div>

<a href="menuu.html" class="back-btn">← Kembali</a>

<script>
document.getElementById('formLapor').addEventListener('submit', function(e){
  e.preventDefault();
  
  const nama = document.getElementById('nama').value;
  const kategori = document.getElementById('kategori').value;
  const subjek = document.getElementById('subjek').value;
  const isi = document.getElementById('isi').value;
  
  // GANTI NOMOR WA HUMAS DISINI - pake format 62 tanpa +
  const noWA = '6285861005494'; 
  
  const pesan = `*LAPORAN WARGA BLOK AC*\n\n` +
                `Nama: ${nama}\n` +
                `Kategori: ${kategori}\n` +
                `Subjek: ${subjek}\n` +
                `Isi:\n${isi}\n\n` +
                `Dikirim via Aplikasi Blok AC`;
  
  const url = `https://wa.me/${noWA}?text=${encodeURIComponent(pesan)}`;
  window.open(url,'https://wa.me/6285861005494?text=${encodeURIComponent(pesan)}`;');
});
</script>

</body>
</html>
