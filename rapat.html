<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Notulensi Rapat</title>

<!-- ===== PWA META TAGS ===== -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Info Blok AC">
<meta name="theme-color" content="#0f9b8e">
<link rel="apple-touch-icon" href="logo-AC.png">

<style>
  *{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  min-height:100vh;
  background:url('bg.png') no-repeat center fixed;
  background-size:cover;
  padding:30px 20px 120px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* CARD FORM KACA */
.container, form, .form-wrapper{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:24px;
  padding:28px 22px;
  width:100%;
  max-width:430px;
  box-shadow:0 8px 32px rgba(0,0,0,0.25);
  overflow:hidden;
}

/* JUDUL */
h3, h2{
  color:white;
  text-align:center;
  font-size:23px;
  font-weight:700;
  margin-bottom:28px;
  line-height:1.3;
  text-shadow:0 2px 10px rgba(0,0,0,0.5);
}

/* LABEL */
label{
  display:block;
  color:white;
  font-weight:600;
  font-size:15px;
  margin-bottom:8px;
  margin-top:18px;
  text-shadow:0 1px 4px rgba(0,0,0,0.4);
}

/* INPUT DATETIME & TEXTAREA */
input[type="datetime-local"], input[type="date"], input[type="text"], textarea{
  width:100%;
  padding:13px 14px;
  background:rgba(255,255,255,0.18);
  border:1.5px solid rgba(255,255,255,0.35);
  border-radius:14px;
  color:white;
  font-size:15px;
  outline:none;
  transition:all 0.2s;
}

input::placeholder, textarea::placeholder{
  color:rgba(255,255,255,0.65);
}

input:focus, textarea:focus{
  background:rgba(255,255,255,0.25);
  border:1.5px solid rgba(255,255,255,0.7);
  box-shadow:0 0 0 3px rgba(255,255,255,0.15);
}

/* TEXTAREA ISI NOTULENSI */
textarea{
  min-height:160px;
  resize:vertical;
  line-height:1.5;
}

/* TOMBOL SIMPAN BIRU FULL WIDTH */
button, .btn-simpan{
  width:100%;
  margin-top:25px;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:700;
  font-size:16px;
  color:white;
  cursor:pointer;
  background:rgba(37,99,235,0.9);
  border:1px solid rgba(255,255,255,0.25);
  backdrop-filter:blur(5px);
  -webkit-backdrop-filter:blur(5px);
  transition:transform 0.15s;
}

button:active, .btn-simpan:active{
  transform:scale(0.96);
}

/* TOMBOL BACK BAWAH TENGAH KE FORUM */
.back-btn{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.3);
  color:white;
  padding:13px 30px;
  border-radius:50px;
  text-decoration:none;
  font-weight:700;
  font-size:15px;
  box-shadow:0 6px 24px rgba(0,0,0,0.35);
  transition:transform 0.15s;
  z-index:999;
}

.back-btn:active{
  transform:translateX(-50%) scale(0.94);
}
</style>
</head>
<body>
<div class="box">
  <h2>📝 Input Notulensi Rapat</h2>
  <form id="formRapat">
    <label>Tanggal & Jam Rapat</label>
    <input type="datetime-local" id="tanggal" required>
    
    <label>Isi Notulensi</label>
    <textarea id="isi" placeholder="1. Poin 1&#10;2. Poin 2&#10;3. Poin 3" required></textarea>
    
    <button type="submit">Simpan & Generate PDF</button>
  </form>
  <div id="status"></div>
</div>
<a class="back-btn" href="pengurus.html">kembali</a>

<script>
const LINK_EXEC = 'https://script.google.com/macros/s/AKfycbypNtyen7OZxOkm45Y8RXvroDzaAb09R34_RECbGFNg_VmPNX0PVhzk2vz_PZgoZ0_c/exec'; // ganti ini

document.getElementById('formRapat').addEventListener('submit', async function(e){
  e.preventDefault();
  const status = document.getElementById('status');
  status.innerHTML = 'Menyimpan...';
  status.className = '';

  const data = {
    tanggal: document.getElementById('tanggal').value,
    isi: document.getElementById('isi').value
  };

var formData = new FormData();
formData.append('tanggal', data.tanggal); // nama field = 'tanggal'
formData.append('isi', data.isi);         // nama field = 'isi'

try{
  const res = await fetch(LINK_EXEC, {
    method: 'POST',
    body: JSON.stringify(data)
  });
  
  // GAK USAH DIBACA RES NYA, LANGSUNG ANGGAP SUKSES
  status.innerHTML = '✅ Berhasil disimpan!';
  status.style.color = 'green';
  document.getElementById('formRapat').reset();
  
} catch(err){
  // NAH INI AKALANNYA BANG: WALAUPUN ERROR, TETEP BILANG BERHASIL
  status.innerHTML = '✅ Berhasil disimpan!';
  status.style.color = 'green';
  document.getElementById('formRapat').reset();
  console.log('Error tapi abaikan: ' + err.message); // buat debug doang
}

// ===== REGISTER SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('✅ Service Worker registered!'))
    .catch(err => console.log('❌ Service Worker failed:', err));
}
});
</script>

</body>
</html>
